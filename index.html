<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống điểm danh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="app-navbar">
        <div class="navbar-brand">🏫 Hệ thống điểm danh</div>
        <button id="themeToggleBtn" class="btn btn-secondary btn-sm" aria-label="Đổi giao diện">Giao diện</button>
    </header>
    
    <main class="container centered-layout">
        <div class="card choice-matrix-card">
            <h2>Chọn vai trò</h2>
            <p class="text-muted">Chọn khu vực phù hợp để tiếp tục.</p>
            <hr>
            <div class="choice-grid">
                <a href="student.html" class="matrix-btn-card student-color">
                    <span class="icon">📱</span>
                    <div class="text-group">
                        <h3>Sinh viên</h3>
                        <p>Quét mã QR và điểm danh theo vị trí.</p>
                    </div>
                </a>
                <a href="teacher.html" class="matrix-btn-card teacher-color">
                    <span class="icon">💼</span>
                    <div class="text-group">
                        <h3>Giảng viên</h3>
                        <p>Tạo ca học, quản lý danh sách và xem điểm danh.</p>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <div id="toastContainer" class="toast-container" aria-live="polite"></div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
